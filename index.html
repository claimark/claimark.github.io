<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claimark — Patent Claim Amendment System</title>
  <style>
    :root {
      --primary: #1a478a;
      --primary-light: #2563eb;
      --primary-dark: #0f2d5e;
      --success: #16a34a;
      --warn: #d97706;
      --error: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header img.logo {
      height: 48px;
      width: auto;
    }
    header .header-text h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    header .header-text p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Layout ── */
    main {
      max-width: 920px;
      margin: 32px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Input row ── */
    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--primary-light); }

    button {
      padding: 10px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: var(--primary-dark); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-pending  { background: #fef9c3; color: #854d0e; }
    .badge-queued   { background: #fef9c3; color: #854d0e; }
    .badge-running  { background: #dbeafe; color: #1d4ed8; }
    .badge-done     { background: #dcfce7; color: #15803d; }
    .badge-error    { background: #fee2e2; color: #b91c1c; }

    /* ── Progress bar ── */
    .progress-wrap {
      background: #e2e8f0;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin: 12px 0 6px;
    }
    .progress-bar {
      height: 100%;
      background: var(--primary-light);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 0.82rem; color: var(--muted); }

    /* ── Meta grid ── */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .meta-item { background: #f1f5f9; border-radius: 8px; padding: 10px 14px; }
    .meta-item .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
    .meta-item .value { font-size: 0.95rem; font-weight: 600; }

    /* ── Tag list ── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag {
      background: #e0e7ff; color: #3730a3;
      padding: 2px 10px; border-radius: 99px; font-size: 0.78rem;
    }
    .tag-pass { background: #dcfce7; color: #15803d; }
    .tag-fail { background: #fee2e2; color: #b91c1c; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
    .tab-btn {
      padding: 8px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.86rem;
      line-height: 1.6;
      font-family: inherit;
      resize: vertical;
      background: #f8fafc;
      color: var(--text);
    }

    /* ── Ranking table ── */
    .rank-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .rank-table th {
      background: #f1f5f9;
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
    }
    .rank-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .rank-table tr:hover { background: #f8fafc; }
    .rank-table .rank-num { font-weight: 700; color: var(--primary); }
    .score { font-weight: 600; }

    /* ── Download btn ── */
    .dl-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .dl-btn:hover { background: var(--primary-dark); }
    .dl-btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .dl-btn-outline:hover { background: #f1f5f9; }

    /* ── Section header ── */
    .section-header {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
      margin: 18px 0 10px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Log box ── */
    details { margin-top: 12px; }
    summary { cursor: pointer; font-size: 0.85rem; color: var(--muted); user-select: none; }
    .log-box {
      margin-top: 8px;
      background: #0f172a;
      color: #94a3b8;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ── Error box ── */
    .error-box {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.87rem;
      color: #7f1d1d;
      white-space: pre-wrap;
      font-family: monospace;
    }

    /* ── Amendment detail ── */
    .amend-detail {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .amend-detail h4 {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .amend-scores {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 0.82rem;
    }
    .amend-scores span { background: #e0e7ff; padding: 2px 8px; border-radius: 4px; }

    #section-progress, #section-result { display: none; }
  </style>
</head>

  <div class="header-text">
    <h1>CLAIMARK</h1>
    <p>Patent Claim Amendment System</p>
  </div>
</header>

<main>

  <!-- ── 입력 카드 ── -->
  <div class="card">
    <h2>출원번호 입력</h2>
    <div class="input-row">
      <input type="text" id="appId" placeholder="예: 18853254" maxlength="20" />
      <button id="btnSubmit" onclick="submitJob()">분석 시작</button>
    </div>
    <p class="input-hint">입력 파일이 없으면 자동으로 생성합니다 (USPTO API 조회, 최대 수분 소요)</p>
    <p id="inputError" style="color:var(--error);font-size:0.83rem;margin-top:8px;display:none"></p>
  </div>

  <!-- ── 진행 카드 ── -->
  <div class="card" id="section-progress">
    <h2>
      진행 상황
      <span id="statusBadge" class="badge badge-pending" style="margin-left:8px">대기 중</span>
    </h2>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <p class="progress-label" id="progressLabel">준비 중...</p>
    <details id="logDetails">
      <summary>실행 로그 펼치기</summary>
      <div class="log-box" id="logBox"></div>
    </details>
  </div>

  <!-- ── 결과 카드 ── -->
  <div class="card" id="section-result">
    <h2>분석 결과</h2>

    <!-- 메타 정보 -->
    <div class="meta-grid">
      <div class="meta-item"><div class="label">출원번호</div><div class="value" id="rAppNum">-</div></div>
      <div class="meta-item"><div class="label">거절 근거</div><div class="value" id="rStatutes">-</div></div>
      <div class="meta-item"><div class="label">선행기술</div><div class="value" id="rPaCount">-</div></div>
      <div class="meta-item"><div class="label">분석 요소</div><div class="value" id="rElemCount">-</div></div>
      <div class="meta-item"><div class="label">소요 시간</div><div class="value" id="rElapsed">-</div></div>
    </div>

    <!-- 선행기술 태그 -->
    <div style="margin-bottom:16px">
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:4px">인용 선행기술 (Prior Arts)</div>
      <div class="tag-list" id="rPaList"></div>
    </div>

    <!-- 리포트 다운로드 -->
    <div id="reportSection" style="margin-bottom:18px; display:none">
      <button class="dl-btn" id="btnReport" onclick="downloadReport()">Word 리포트 다운로드 (.docx)</button>
    </div>

    <!-- 탭: 원본 / Top 보정안 -->
    <div class="section-header">Original Claim 1</div>
    <textarea id="rOrigClaim" rows="6" readonly></textarea>

    <!-- 최종 순위 테이블 -->
    <div class="section-header">Final Ranking (M7)</div>
    <table class="rank-table" id="rankTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>ID</th>
          <th>Scope</th>
          <th>Diff</th>
          <th>Arg</th>
          <th>Total</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>

    <!-- Top 보정안 탭 -->
    <div class="section-header">Top Amendments (Detail)</div>
    <div class="tabs" id="amendTabs"></div>
    <div id="amendPanels"></div>
  </div>

  <!-- ── 에러 카드 ── -->
  <div class="card" id="section-error" style="display:none">
    <h2 style="color:var(--error)">오류 발생</h2>
    <div class="error-box" id="errorBox"></div>
  </div>

</main>

<script>
  // ── 설정 ──────────────────────────────────────────────────
  // cloudflared 재실행 시 이 URL을 변경하세요
  const API_BASE = "https://pins-submit-shaped-enhanced.trycloudflare.com";
  const POLL_MS  = 3000;

  let _pollTimer = null;
  let _currentJobId = null;

  // ── 작업 제출 ─────────────────────────────────────────────
  async function submitJob() {
    const appId = document.getElementById("appId").value.trim();
    const errEl = document.getElementById("inputError");

    if (!appId || !/^\d{7,9}$/.test(appId)) {
      errEl.textContent = "7~9자리 출원번호를 입력해주세요.";
      errEl.style.display = "block";
      return;
    }
    errEl.style.display = "none";
    document.getElementById("btnSubmit").disabled = true;
    resetUI();

    try {
      const res = await fetch(`${API_BASE}/api/jobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ app_id: appId }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || "작업 생성 실패");
        document.getElementById("btnSubmit").disabled = false;
        return;
      }

      _currentJobId = data.job_id;
      document.getElementById("section-progress").style.display = "block";
      startPolling(_currentJobId);

    } catch (e) {
      showError(`서버 연결 실패: ${e.message}\n\nAPI 서버(${API_BASE})가 실행 중인지 확인하세요.`);
      document.getElementById("btnSubmit").disabled = false;
    }
  }

  // ── 폴링 ──────────────────────────────────────────────────
  function startPolling(jobId) {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(() => pollJob(jobId), POLL_MS);
    pollJob(jobId);
  }

  async function pollJob(jobId) {
    try {
      const res  = await fetch(`${API_BASE}/api/jobs/${jobId}`);
      const data = await res.json();
      updateProgress(data);

      if (data.status === "done" || data.status === "error") {
        clearInterval(_pollTimer);
        _pollTimer = null;
        document.getElementById("btnSubmit").disabled = false;
      }
    } catch (e) { /* 일시적 오류 무시 */ }
  }

  // ── UI 업데이트 ────────────────────────────────────────────
  function updateProgress(data) {
    const badge = document.getElementById("statusBadge");
    const bar   = document.getElementById("progressBar");
    const label = document.getElementById("progressLabel");
    const logBox = document.getElementById("logBox");

    const statusMap = {
      pending: ["대기 중",      "badge-pending"],
      queued:  ["GPU 대기 중",  "badge-queued"],
      running: ["실행 중",      "badge-running"],
      done:    ["완료",         "badge-done"],
      error:   ["오류",         "badge-error"],
    };
    const [text, cls] = statusMap[data.status] || ["알 수 없음", "badge-pending"];
    badge.textContent = text;
    badge.className   = `badge ${cls}`;

    bar.style.width    = `${data.progress || 0}%`;
    label.textContent  = data.step || "";
    logBox.textContent = (data.logs || []).join("\n");
    logBox.scrollTop   = logBox.scrollHeight;

    if (data.status === "done") fetchResult();
    if (data.status === "error") showError(data.error || "알 수 없는 오류");
  }

  // ── 결과 fetch & 표시 ──────────────────────────────────────
  async function fetchResult() {
    if (!_currentJobId) return;
    try {
      const res = await fetch(`${API_BASE}/api/jobs/${_currentJobId}/result`);
      const r   = await res.json();
      showResult(r);
    } catch (e) {
      showError(`결과 조회 실패: ${e.message}`);
    }
  }

  function showResult(r) {
    document.getElementById("section-result").style.display = "block";

    // 메타
    document.getElementById("rAppNum").textContent   = r.application_number || "-";
    document.getElementById("rStatutes").textContent  = (r.rejection_statutes || []).join(", ") || "-";
    document.getElementById("rPaCount").textContent   = (r.prior_arts || []).length + "건";
    document.getElementById("rElemCount").textContent  = (r.elements || []).length + "개";
    document.getElementById("rElapsed").textContent    =
      r.elapsed ? Math.round(r.elapsed) + "초" : "-";

    // 선행기술 태그
    const paList = document.getElementById("rPaList");
    paList.innerHTML = "";
    (r.prior_arts || []).forEach(pa => {
      const t = document.createElement("span");
      t.className = "tag";
      t.textContent = `${pa.alias || "?"} (${pa.identifier || "?"})`;
      paList.appendChild(t);
    });

    // 리포트 다운로드
    if (r.report_available) {
      document.getElementById("reportSection").style.display = "block";
    }

    // 원본 Claim 1
    document.getElementById("rOrigClaim").value = r.claim1_text || "";

    // 순위 테이블
    const rankBody = document.getElementById("rankBody");
    rankBody.innerHTML = "";
    (r.ranked_amendments || []).forEach(ra => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank-num">${ra.rank}</td>
        <td>${ra.amendment_id}</td>
        <td class="score">${(ra.scope_score || 0).toFixed(2)}</td>
        <td class="score">${(ra.diff_score || 0).toFixed(2)}</td>
        <td class="score">${(ra.arg_score || 0).toFixed(2)}</td>
        <td class="score" style="color:var(--primary)">${(ra.total_score || 0).toFixed(2)}</td>
        <td>${ra.summary || ""}</td>
      `;
      rankBody.appendChild(tr);
    });

    // Top 보정안 상세 탭
    buildAmendmentTabs(r);
  }

  function buildAmendmentTabs(r) {
    const tabsEl   = document.getElementById("amendTabs");
    const panelsEl = document.getElementById("amendPanels");
    tabsEl.innerHTML   = "";
    panelsEl.innerHTML = "";

    const ranked = r.ranked_amendments || [];
    const amendments = r.amendments || [];
    const verifications = r.verifications || [];
    const arguments_ = r.arguments || [];

    const topN = Math.min(ranked.length, 5);

    for (let i = 0; i < topN; i++) {
      const ra  = ranked[i];
      const aid = ra.amendment_id;

      // 탭 버튼
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (i === 0 ? " active" : "");
      btn.textContent = `#${ra.rank} ${aid}`;
      btn.onclick = function() { switchAmendTab(i, this); };
      tabsEl.appendChild(btn);

      // 패널
      const panel = document.createElement("div");
      panel.className = "tab-panel amend-detail" + (i === 0 ? " active" : "");
      panel.id = `amend-panel-${i}`;

      const amend = amendments.find(a => a.id === aid) || {};
      const verif = verifications.find(v => v.amendment_id === aid) || {};
      const arg   = arguments_.find(a => a.amendment_id === aid) || {};

      const passTag = verif.pass
        ? '<span class="tag tag-pass">PASS</span>'
        : '<span class="tag tag-fail">FAIL</span>';

      panel.innerHTML = `
        <h4>${aid} (Source: ${amend.source || "-"})</h4>
        <div class="amend-scores">
          <span>Scope: ${(ra.scope_score||0).toFixed(2)}</span>
          <span>Diff: ${(ra.diff_score||0).toFixed(2)}</span>
          <span>Arg: ${(ra.arg_score||0).toFixed(2)}</span>
          <span style="background:#dbeafe;font-weight:700">Total: ${(ra.total_score||0).toFixed(2)}</span>
          ${passTag}
        </div>
        <div style="font-size:0.82rem;color:var(--muted);margin-bottom:4px">Amended Claim 1</div>
        <textarea rows="6" readonly style="margin-bottom:10px">${amend.amended_claim1 || "(없음)"}</textarea>
        <div style="font-size:0.82rem;color:var(--muted);margin-bottom:4px">Argument</div>
        <textarea rows="4" readonly>${arg.argument || "(없음)"}</textarea>
      `;
      panelsEl.appendChild(panel);
    }

    if (topN === 0) {
      panelsEl.innerHTML = '<p style="color:var(--muted);font-size:0.88rem">순위 결과 없음</p>';
    }
  }

  function switchAmendTab(idx, btn) {
    document.querySelectorAll("#amendTabs .tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll("#amendPanels .tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    const panel = document.getElementById(`amend-panel-${idx}`);
    if (panel) panel.classList.add("active");
  }

  // ── 리포트 다운로드 ────────────────────────────────────────
  function downloadReport() {
    if (!_currentJobId) return;
    window.open(`${API_BASE}/api/jobs/${_currentJobId}/report`, "_blank");
  }

  // ── 에러 표시 ──────────────────────────────────────────────
  function showError(msg) {
    document.getElementById("section-error").style.display = "block";
    document.getElementById("errorBox").textContent = msg;
  }

  // ── UI 초기화 ──────────────────────────────────────────────
  function resetUI() {
    ["section-result", "section-error"].forEach(id => {
      document.getElementById(id).style.display = "none";
    });
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("logBox").textContent = "";
    document.getElementById("progressLabel").textContent = "준비 중...";
    document.getElementById("reportSection").style.display = "none";
  }

  // Enter 키 제출
  document.getElementById("appId").addEventListener("keydown", e => {
    if (e.key === "Enter") submitJob();
  });
</script>
</body>
</html>
